<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="format-detection" content="telephone=no">
<title>탁구 대진표 - iPad 호환 최종판</title>
<style>
:root{
  --bg-primary:#ffffff;
  --bg-secondary:#f4f6f8;
  --bg-info:#eef6ff;
  --text-primary:#111827;
  --text-secondary:#6b7280;
  --text-danger:#b91c1c;
  --border-main:#a8b0bb;
  --border-sub:#cfd6dd;
  --border-info:#60a5fa;
  --blue-fill:#e6f1fb;
  --blue-text:#0c447c;
  --win-bg:#e6f1fb;
  --win-text:#185fa5;
  --lose-bg:#fcebeb;
  --lose-text:#a32d2d;
  --draw-bg:#f1efe8;
  --draw-text:#5f5e5a;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{
  width:100%;
  min-height:100%;
  background:var(--bg-primary);
  color:var(--text-primary);
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",
              "Malgun Gothic","Segoe UI",Arial,sans-serif;
  line-height:1.45;
}
button,input{font:inherit;}
input,textarea,select,button{-webkit-appearance:none;appearance:none;}
.wrap{padding:14px;width:100%;}
.title{font-size:18px;font-weight:700;margin-bottom:10px;}
.controls{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
.controls label{font-size:14px;color:var(--text-secondary);}
.controls input[type=number]{
  width:68px;min-height:38px;font-size:14px;padding:6px 8px;border:1px solid var(--border-main);
  border-radius:10px;background:var(--bg-primary);color:var(--text-primary);text-align:center;
}
.controls button{
  min-height:38px;font-size:14px;padding:8px 14px;border:1px solid var(--border-main);
  border-radius:10px;background:var(--bg-primary);color:var(--text-primary);
}
.controls button.primary{background:var(--blue-fill);color:var(--blue-text);border-color:#b7cee4;font-weight:600;}
.name-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.name-row input{
  width:96px;min-height:36px;font-size:13px;padding:6px 8px;border:1px solid var(--border-main);
  border-radius:8px;background:var(--bg-primary);color:var(--text-primary);
}
.legend{font-size:12px;color:var(--text-secondary);margin-bottom:8px;line-height:1.7;}
.legend b{font-weight:700;color:var(--text-primary);}
.table-shell{
  width:100%;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;
  border:1px solid var(--border-main);border-radius:12px;background:var(--bg-primary);padding:0;
}
#tbl{display:block;width:max-content;min-width:100%;}
table{border-collapse:collapse;table-layout:fixed;background:var(--bg-primary);width:auto;}
th,td{border:1px solid var(--border-main);text-align:center;vertical-align:middle;}
.th-corner{width:78px;min-width:78px;background:var(--bg-secondary);position:relative;height:60px;}
.th-corner-line{position:absolute;left:0;top:0;right:0;bottom:0;overflow:hidden;}
.th-corner-line:after{
  content:'';position:absolute;top:0;left:0;width:160px;height:1px;background:var(--border-main);
  transform-origin:top left;transform:rotate(36deg);
}
.th-corner-inner{position:absolute;left:0;top:0;right:0;bottom:0;padding:5px 7px;font-size:11px;color:var(--text-secondary);}
.th-corner-inner .tr{display:block;text-align:right;}
.th-corner-inner .bl{display:block;text-align:left;position:absolute;left:7px;bottom:5px;}
.th-name{
  width:96px;min-width:96px;background:var(--blue-fill);color:var(--blue-text);font-weight:700;
  font-size:12px;padding:4px;height:60px;word-break:keep-all;
}
.th-stat{
  width:96px;min-width:96px;background:var(--bg-secondary);color:var(--text-secondary);
  font-weight:700;font-size:11px;padding:4px;
}
.td-rowname{
  width:78px;min-width:78px;background:var(--blue-fill);color:var(--blue-text);font-weight:700;
  font-size:12px;padding:4px 6px;height:60px;word-break:keep-all;
}
.td-diag{width:96px;min-width:96px;height:60px;background:var(--bg-secondary);position:relative;}
.td-diag:after{
  content:'';position:absolute;left:0;top:0;right:0;bottom:0;
  background:linear-gradient(to bottom right, transparent 49.2%, var(--border-main) 49.2%, var(--border-main) 50.8%, transparent 50.8%);
}
.td-game{width:96px;min-width:96px;height:60px;padding:4px 3px;background:var(--bg-primary);}
.td-game.auto-filled{background:var(--bg-secondary);}
.game-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:50px;}
.score-display{display:flex;align-items:center;justify-content:center;gap:3px;}
.score-display input{
  width:30px;height:30px;font-size:13px;font-weight:700;border:1px solid var(--border-main);
  border-radius:6px;background:var(--bg-primary);color:var(--text-primary);text-align:center;padding:0;outline:none;
  -moz-appearance:textfield;
}
.score-display input::-webkit-outer-spin-button,.score-display input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
.score-display input:focus{border-color:var(--border-info);background:var(--bg-info);}
.score-display input[readonly]{background:var(--bg-secondary);color:var(--text-secondary);border-color:var(--border-sub);}
.score-sep{font-size:12px;color:var(--text-secondary);}
.result-badge{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px;min-width:42px;display:inline-block;}
.badge-win{background:var(--win-bg);color:var(--win-text);}
.badge-lose{background:var(--lose-bg);color:var(--lose-text);}
.badge-draw{background:var(--draw-bg);color:var(--draw-text);}
.badge-empty{background:transparent;color:transparent;}
.td-stat{width:96px;min-width:96px;font-size:12px;padding:4px;background:var(--bg-primary);}
.wl-text{font-weight:700;color:var(--text-primary);}
.rate-text{font-size:11px;color:var(--text-secondary);}
.rank-gold{font-size:15px;font-weight:800;color:#ba7517;}
.rank-silver{font-size:14px;font-weight:800;color:#888780;}
.rank-bronze{font-size:13px;font-weight:800;color:#3c3489;}
.rank-other{font-size:13px;color:var(--text-secondary);}
.rank-none{font-size:12px;color:var(--border-main);}
.hint{font-size:12px;color:var(--text-danger);margin-top:8px;}
.footer-note{font-size:11px;color:var(--text-secondary);margin-top:8px;}
@media (max-width: 768px){
  .wrap{padding:12px;}
  .name-row input{width:100px;}
}
@supports (-webkit-touch-callout:none){
  body{padding-bottom:env(safe-area-inset-bottom);}
}

.splash{position:fixed;inset:0;background:#AAA;display:flex;align-items:center;justify-content:center;z-index:9999;}
.splash img{max-width:100%;max-height:100%;object-fit:contain;}
.hidden{display:none !important;}
</style>
</head>
<body>
<div id="splash" class="splash">
  <img src="https://raw.githubusercontent.com/OIhroDIL/imgBackUp/refs/heads/main/pingpong.gif" alt="시작 화면 GIF">
</div>
<div class="wrap hidden" id="mainWrap">
  <div class="title">탁구 대진표</div>

  <div class="controls">
    <label for="pcount">참가자 수:</label>
    <input type="number" id="pcount" min="2" max="20" value="4" inputmode="numeric">
    <button class="primary" type="button" id="buildBtn">대진표 생성</button>
    <button type="button" id="resetBtn">점수 초기화</button>
  </div>

  <div class="name-row" id="nameRow"></div>

  <div class="legend">
    <b>상삼각(우측)</b> 셀에만 점수 입력 → 하삼각(좌측) 상대방 칸에 자동 반영<br>
    <b>순위 기준</b>: 경기 승수 → 세트 승수 → 세트 득실차<br>
    <b>Enter / Tab / 방향키</b>로 다음 칸 이동 &nbsp;|&nbsp; 회색 칸은 자동입력(수정 불가)
  </div>

  <div class="table-shell">
    <div id="tbl"></div>
  </div>

  <div class="hint" id="hint"></div>
  <div class="footer-note">iPad/모바일에서 가로로 넘겨 보면서 입력할 수 있습니다.</div>
  <div class="footer-note">만든동물 : 두루미, 랠리메이트 동호회, 대진표 Ver 0.0</div>
</div>

<script>
var n = 4;
var names = [];
var sc = [];
var inputOrder = [];

function initState(count){
  var i, j;
  names = [];
  sc = [];
  for(i=0;i<count;i++){ names.push('선수' + (i+1)); }
  for(i=0;i<count;i++){
    var row = [];
    for(j=0;j<count;j++){ row.push({me:'', opp:''}); }
    sc.push(row);
  }
}

function isEditable(i, j){ return i < j; }

function sanitizeScore(val){
  if(val === null || typeof val === 'undefined' || val === '') return '';
  return String(val).replace(/[^0-9]/g, '').slice(0, 2);
}

function buildInputOrder(){
  inputOrder = [];
  var i, j;
  for(i=0;i<n-1;i++){
    for(j=i+1;j<n;j++){
      inputOrder.push({i:i, j:j, role:'me'});
      inputOrder.push({i:i, j:j, role:'opp'});
    }
  }
}

function focusNext(i,j,role){
  var cur = -1, k, nx, el;
  for(k=0;k<inputOrder.length;k++){
    if(inputOrder[k].i===i && inputOrder[k].j===j && inputOrder[k].role===role){ cur = k; break; }
  }
  if(cur < 0) return;
  for(k=cur+1;k<inputOrder.length;k++){
    nx = inputOrder[k];
    el = document.getElementById('inp-' + nx.i + '-' + nx.j + '-' + nx.role);
    if(el && !el.readOnly){ el.focus(); if(el.select) el.select(); return; }
  }
}

function focusPrev(i,j,role){
  var cur = -1, k, pv, el;
  for(k=0;k<inputOrder.length;k++){
    if(inputOrder[k].i===i && inputOrder[k].j===j && inputOrder[k].role===role){ cur = k; break; }
  }
  if(cur <= 0) return;
  for(k=cur-1;k>=0;k--){
    pv = inputOrder[k];
    el = document.getElementById('inp-' + pv.i + '-' + pv.j + '-' + pv.role);
    if(el && !el.readOnly){ el.focus(); if(el.select) el.select(); return; }
  }
}

function handleKey(e, i, j, role){
  var key = e.key || e.keyCode;
  var isShiftTab = (key === 'Tab' && e.shiftKey);
  if(key === 'Enter' || key === 'Tab' || key === 'ArrowRight' || key === 'ArrowDown' || key === 13 || key === 9 || key === 39 || key === 40){
    if(e.preventDefault) e.preventDefault();
    if(isShiftTab) focusPrev(i, j, role);
    else focusNext(i, j, role);
  }else if(key === 'ArrowLeft' || key === 'ArrowUp' || key === 37 || key === 38 || isShiftTab){
    if(e.preventDefault) e.preventDefault();
    focusPrev(i, j, role);
  }
}

function onScoreInput(i, j, role, val){
  var clean = sanitizeScore(val);
  sc[i][j][role] = clean;

  var active = document.getElementById('inp-' + i + '-' + j + '-' + role);
  if(active && active.value !== clean) active.value = clean;

  sc[j][i].me = sc[i][j].opp;
  sc[j][i].opp = sc[i][j].me;

  var mirrorMeEl = document.getElementById('inp-' + j + '-' + i + '-me');
  var mirrorOppEl = document.getElementById('inp-' + j + '-' + i + '-opp');
  if(mirrorMeEl) mirrorMeEl.value = sc[j][i].me;
  if(mirrorOppEl) mirrorOppEl.value = sc[j][i].opp;

  updateAll();
}

function calcStats(){
  var wins = [], losses = [], played = [];
  var setWins = [], setLosses = [];
  var i, j, me, opp;
  for(i=0;i<n;i++){
    wins[i] = 0; losses[i] = 0; played[i] = 0;
    setWins[i] = 0; setLosses[i] = 0;
  }

  for(i=0;i<n;i++){
    for(j=0;j<n;j++){
      if(i === j) continue;
      me = parseInt(sc[i][j].me, 10);
      opp = parseInt(sc[i][j].opp, 10);
      if(isNaN(me) || isNaN(opp) || sc[i][j].me === '' || sc[i][j].opp === '') continue;

      played[i]++;
      setWins[i] += me;
      setLosses[i] += opp;

      if(me > opp) wins[i]++;
      else if(me < opp) losses[i]++;
    }
  }
  return {wins:wins, losses:losses, played:played, setWins:setWins, setLosses:setLosses};
}

function getRanks(wins, losses, played, setWins, setLosses){
  var arr = [];
  var i, rank = [];
  for(i=0;i<n;i++){
    arr.push({
      i:i,
      w:wins[i],
      l:losses[i],
      p:played[i],
      sw:setWins[i],
      sl:setLosses[i],
      sd:setWins[i] - setLosses[i]
    });
  }

  arr.sort(function(a, b){
    if(b.w !== a.w) return b.w - a.w;
    if(b.sw !== a.sw) return b.sw - a.sw;
    if(b.sd !== a.sd) return b.sd - a.sd;
    if(a.l !== b.l) return a.l - b.l;
    return 0;
  });

  for(i=0;i<n;i++){ rank[i] = 0; }
  for(i=0;i<arr.length;i++){ rank[arr[i].i] = i + 1; }
  return rank;
}

function getResult(i, j){
  var me = parseInt(sc[i][j].me, 10);
  var opp = parseInt(sc[i][j].opp, 10);
  if(sc[i][j].me === '' || sc[i][j].opp === '') return '';
  if(isNaN(me) || isNaN(opp)) return '';
  if(me > opp) return 'win';
  if(me < opp) return 'lose';
  return 'draw';
}

function updateAll(){
  var stats = calcStats();
  var wins = stats.wins;
  var losses = stats.losses;
  var played = stats.played;
  var setWins = stats.setWins;
  var setLosses = stats.setLosses;
  var ranks = getRanks(wins, losses, played, setWins, setLosses);

  var i, j, badge, r, wlEl, rateEl, rankEl, rk;
  for(i=0;i<n;i++){
    for(j=0;j<n;j++){
      if(i === j) continue;
      badge = document.getElementById('badge-' + i + '-' + j);
      if(!badge) continue;

      r = getResult(i, j);
      if(r === 'win'){
        badge.textContent = '승';
        badge.className = 'result-badge badge-win';
      }else if(r === 'lose'){
        badge.textContent = '패';
        badge.className = 'result-badge badge-lose';
      }else if(r === 'draw'){
        badge.textContent = '무';
        badge.className = 'result-badge badge-draw';
      }else{
        badge.textContent = '-';
        badge.className = 'result-badge badge-empty';
      }
    }

    wlEl = document.getElementById('wl-' + i);
    rateEl = document.getElementById('rate-' + i);
    rankEl = document.getElementById('rank-' + i);

    if(wlEl) wlEl.textContent = played[i] > 0 ? (wins[i] + '승 ' + losses[i] + '패') : '-';
    if(rateEl) rateEl.textContent = played[i] > 0 ? ('세트 ' + setWins[i] + '승 ' + setLosses[i] + '패') : '';

    if(rankEl){
      rk = ranks[i];
      if(played[i] === 0){
        rankEl.textContent = '-';
        rankEl.className = 'rank-none';
      }else if(rk === 1){
        rankEl.textContent = '1위';
        rankEl.className = 'rank-gold';
      }else if(rk === 2){
        rankEl.textContent = '2위';
        rankEl.className = 'rank-silver';
      }else if(rk === 3){
        rankEl.textContent = '3위';
        rankEl.className = 'rank-bronze';
      }else{
        rankEl.textContent = rk + '위';
        rankEl.className = 'rank-other';
      }
    }
  }
}

function renderNames(){
  var r = document.getElementById('nameRow');
  var i, inp;
  r.innerHTML = '';
  for(i=0;i<n;i++){
    inp = document.createElement('input');
    inp.type = 'text';
    inp.placeholder = '선수' + (i+1);
    inp.value = names[i];
    inp.setAttribute('data-i', i);
    inp.oninput = function(){
      var idx = parseInt(this.getAttribute('data-i'), 10);
      names[idx] = this.value.replace(/^\s+|\s+$/g, '') || ('선수' + (idx+1));
      syncNames();
    };
    r.appendChild(inp);
  }
}

function syncNames(){
  var els = document.querySelectorAll('.hdr-name');
  var i, idx;
  for(i=0;i<els.length;i++){
    idx = parseInt(els[i].getAttribute('data-idx'), 10);
    if(!isNaN(idx)) els[i].textContent = names[idx];
  }
}

function renderTable(){
  buildInputOrder();
  var html = '';
  var i, j, editable, tdClass;

  html += '<table><thead><tr>';
  html += '<th class="th-corner"><div class="th-corner-line"></div><div class="th-corner-inner"><span class="tr">상대</span><span class="bl">본인</span></div></th>';

  for(j=0;j<n;j++){
    html += '<th class="th-name"><span class="hdr-name" data-idx="' + j + '">' + names[j] + '</span></th>';
  }

  html += '<th class="th-stat">승패 / 세트</th><th class="th-stat">순위</th></tr></thead><tbody>';

  for(i=0;i<n;i++){
    html += '<tr><td class="td-rowname"><span class="hdr-name" data-idx="' + i + '">' + names[i] + '</span></td>';

    for(j=0;j<n;j++){
      if(i === j){
        html += '<td class="td-diag"></td>';
        continue;
      }

      editable = isEditable(i, j);
      tdClass = editable ? 'td-game' : 'td-game auto-filled';

      if(editable){
        html += '<td class="' + tdClass + '"><div class="game-inner">';
        html += '<div class="score-display">';
        html += '<input type="number" inputmode="numeric" min="0" max="99" id="inp-' + i + '-' + j + '-me" data-role="me" placeholder="나">';
        html += '<span class="score-sep">:</span>';
        html += '<input type="number" inputmode="numeric" min="0" max="99" id="inp-' + i + '-' + j + '-opp" data-role="opp" placeholder="상">';
        html += '</div><span class="result-badge badge-empty" id="badge-' + i + '-' + j + '">-</span></div></td>';
      }else{
        html += '<td class="' + tdClass + '"><div class="game-inner">';
        html += '<div class="score-display">';
        html += '<input type="number" inputmode="numeric" id="inp-' + i + '-' + j + '-me" readonly tabindex="-1" placeholder="-">';
        html += '<span class="score-sep">:</span>';
        html += '<input type="number" inputmode="numeric" id="inp-' + i + '-' + j + '-opp" readonly tabindex="-1" placeholder="-">';
        html += '</div><span class="result-badge badge-empty" id="badge-' + i + '-' + j + '">-</span></div></td>';
      }
    }

    html += '<td class="td-stat"><div class="wl-text" id="wl-' + i + '">-</div><div class="rate-text" id="rate-' + i + '"></div></td>';
    html += '<td class="td-stat"><span id="rank-' + i + '" class="rank-none">-</span></td></tr>';
  }

  html += '</tbody></table>';
  document.getElementById('tbl').innerHTML = html;
  bindInputs();
}

function bindInputs(){
  var i, j, meEl, oppEl;
  for(i=0;i<n;i++){
    for(j=0;j<n;j++){
      if(!isEditable(i,j)) continue;

      meEl = document.getElementById('inp-' + i + '-' + j + '-me');
      oppEl = document.getElementById('inp-' + i + '-' + j + '-opp');

      (function(ii, jj, el){
        el.oninput = function(){ onScoreInput(ii, jj, 'me', this.value); };
        el.onkeydown = function(e){ handleKey(e || window.event, ii, jj, 'me'); };
        el.onfocus = function(){ if(this.select) this.select(); };
      })(i, j, meEl);

      (function(ii, jj, el){
        el.oninput = function(){ onScoreInput(ii, jj, 'opp', this.value); };
        el.onkeydown = function(e){ handleKey(e || window.event, ii, jj, 'opp'); };
        el.onfocus = function(){ if(this.select) this.select(); };
      })(i, j, oppEl);
    }
  }
}

function resetScores(){
  var i, j;
  for(i=0;i<n;i++){
    for(j=0;j<n;j++){
      sc[i][j].me = '';
      sc[i][j].opp = '';
    }
  }
  var inputs = document.querySelectorAll('input[data-role]');
  for(i=0;i<inputs.length;i++){ inputs[i].value = ''; }
  var readonlys = document.querySelectorAll('.td-game.auto-filled input');
  for(i=0;i<readonlys.length;i++){ readonlys[i].value = ''; }
  updateAll();
}

function build(){
  var val = parseInt(document.getElementById('pcount').value, 10);
  var hint = document.getElementById('hint');

  if(isNaN(val) || val < 2){
    hint.textContent = '참가자 수는 2명 이상이어야 합니다.';
    return;
  }
  if(val > 20){
    hint.textContent = '참가자 수는 최대 20명까지 입력 가능합니다.';
    return;
  }

  hint.textContent = '';
  n = val;
  initState(n);
  renderNames();
  renderTable();
  updateAll();
}

document.getElementById('buildBtn').onclick = build;
document.getElementById('resetBtn').onclick = resetScores;

window.addEventListener('load', function(){
  var splash = document.getElementById('splash');
  var mainWrap = document.getElementById('mainWrap');
  var splashImg = splash ? splash.querySelector('img') : null;
  var appStarted = false;
  var GIF_DURATION_MS = 11050; // pingpong.gif 실제 재생 길이 기준

  function startApp(){
    if(appStarted) return;
    appStarted = true;
    if(splash) splash.classList.add('hidden');
    if(mainWrap) mainWrap.classList.remove('hidden');
    build();
  }

  if(splashImg){
    splashImg.addEventListener('error', function(){
      startApp();
    });
  }

  setTimeout(function(){
    startApp();
  }, GIF_DURATION_MS);
});
</script>
</body>
</html>
